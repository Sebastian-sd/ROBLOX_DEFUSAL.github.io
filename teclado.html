<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Teclado - Calculador</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #121212;
            color: #00ff66;
            padding: 20px;
            max-width: 550px;
            margin: 0 auto;
        }
        /* BOTÓN VOLVER */
        .btn-volver {
            display: inline-block;
            text-decoration: none;
            color: #888;
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 8px 14px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        .btn-volver:hover {
            color: #fff;
            background-color: #333;
            border-color: #888;
        }
        h1, h2 {
            text-align: center;
            color: #ff3333;
            text-transform: uppercase;
            border-bottom: 2px solid #ff3333;
            padding-bottom: 8px;
            margin-top: 5px;
        }
        .section {
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
        }
        
        /* DISEÑO DE ENTRADAS DE MATRIZ 2x2 */
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }
        .input-box {
            display: flex;
            flex-direction: column;
            background-color: #181818;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
        }
        .input-box label {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        input[type="number"] {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #555;
            padding: 8px;
            font-size: 1.2em;
            border-radius: 4px;
            font-family: inherit;
            text-align: center;
        }
        input[type="number"]:focus {
            border-color: #00ff66;
            outline: none;
        }

        /* CUADRÍCULA DE RESULTADO FÍSICO */
        .grid-output {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 300px;
            margin: 15px auto;
        }
        .cell-output {
            background-color: #222;
            border: 2px solid #ff3333;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            color: #ffff00;
        }
        .cell-output.first {
            border-color: #00ff66;
            background-color: #0d2613;
            color: #00ff66;
        }

        .btn-danger {
            background-color: #ff3333;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
            font-family: inherit;
        }
        .btn-danger:hover {
            background-color: #cc0000;
        }
        #resultado {
            background-color: #000;
            border: 2px dashed #00ff66;
            padding: 15px;
            margin-top: 15px;
            border-radius: 6px;
            font-size: 1.1em;
        }
        .metrics {
            font-size: 0.85em;
            color: #888;
            margin-top: 10px;
            border-top: 1px solid #222;
            padding-top: 8px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>

    <h1>Desarmador de Teclado</h1>
    
    <div class="section">
        <h2>1. Valores de los Botones</h2>
        <p style="font-size: 0.85em; color: #888; text-align: center; margin: 0;">Ingresa el número escrito en cada botón físico:</p>
        
        <div class="grid-inputs">
            <div class="input-box">
                <label>Botón 1 (Arriba Izq)</label>
                <input type="number" id="b1" placeholder="--" oninput="calcularTeclado()">
            </div>
            <div class="input-box">
                <label>Botón 2 (Arriba Der)</label>
                <input type="number" id="b2" placeholder="--" oninput="calcularTeclado()">
            </div>
            <div class="input-box">
                <label>Botón 3 (Abajo Izq)</label>
                <input type="number" id="b3" placeholder="--" oninput="calcularTeclado()">
            </div>
            <div class="input-box">
                <label>Botón 4 (Abajo Der)</label>
                <input type="number" id="b4" placeholder="--" oninput="calcularTeclado()">
            </div>
        </div>
    </div>

    <div class="section">
        <h2>2. Orden de Pulsación</h2>
        <div id="resultado">
            Ingresa los 4 números para calcular la solución...
        </div>
        <button class="btn-danger" onclick="resetear()">Limpiar Datos</button>
    </div>

    <script>
        function calcularTeclado() {
            const b1 = parseInt(document.getElementById('b1').value);
            const b2 = parseInt(document.getElementById('b2').value);
            const b3 = parseInt(document.getElementById('b3').value);
            const b4 = parseInt(document.getElementById('b4').value);
            const resDiv = document.getElementById('resultado');

            // Validar que todos los campos tengan números válidos
            if (isNaN(b1) || isNaN(b2) || isNaN(b3) || isNaN(b4)) {
                resDiv.innerHTML = "Ingresa los 4 números para calcular la solución...";
                return;
            }

            // --- CÁLCULO LOGÍSTICO DEL MODULO ---
            let x = 0;

            // Paso 1: Botón 1
            if (b1 < 40) x = 15;
            else if (b1 > 70) x = 40;
            else x = 25;

            // Paso 2: Botón 2
            if (b2 < 40) x += 25;
            else if (b2 > 70) x *= 2;
            else x -= 75;

            // Paso 3: Botón 3
            if (b3 < 25) x *= 2;
            else if (b3 > 60) x += 15;
            // Si no se cumple ninguno, se mantiene igual

            // Paso 4: Botón 4
            if (b4 < 50) x -= 45;
            else if (b4 > 75) x -= 20;
            else x += 15;

            // Paso 5: Encontrar el valor más pequeño de las etiquetas e Y
            const minLabel = Math.min(b1, b2, b3, b4);
            const y = x + minLabel;

            // Paso 6: Determinar la Tabla correspondiente
            let tablaN = 1;
            let layout = []; // Mapeo de posiciones físicas: [TL, TR, BL, BR]

            if (y <= 0) {
                tablaN = 1;
                layout = [1, 2, 3, 4];
            } else if (y >= 1 && y <= 29) {
                tablaN = 2;
                layout = [1, 2, 4, 3];
            } else if (y >= 30 && y <= 49) {
                tablaN = 3;
                layout = [4, 3, 2, 1];
            } else if (y >= 50 && y <= 79) {
                tablaN = 4;
                layout = [2, 4, 1, 3];
            } else if (y >= 80) {
                tablaN = 5;
                layout = [3, 1, 2, 4];
            }

            // --- GENERAR LA RESPUESTA VISUAL EN HTML ---
            let html = `<div style="text-align:center; margin-bottom:10px; color:#00bcd4; font-weight:bold; font-size:0.9em;">TABLA DETECTADA: TABLA ${tablaN}</div>`;
            html += `<p style="text-align:center; font-size:0.95em; margin:5px 0;">Presiona los botones en este orden físico:</p>`;
            
            // Render de la cuadrícula interactiva
            html += `<div class="grid-output">
                <div class="cell-output ${layout[0]===1?'first':''}">${layout[0]}º</div>
                <div class="cell-output ${layout[1]===1?'first':''}">${layout[1]}º</div>
                <div class="cell-output ${layout[2]===1?'first':''}">${layout[2]}º</div>
                <div class="cell-output ${layout[3]===1?'first':''}">${layout[3]}º</div>
            </div>`;

            // Agregar notas de las variables de depuración abajo por si acaso
            html += `<div class="metrics">
                <strong>Datos de auditoría:</strong> X Final = ${x} | Mínimo = ${minLabel} | Valor Y = ${y}
            </div>`;

            resDiv.innerHTML = html;
        }

        function resetear() {
            document.getElementById('b1').value = '';
            document.getElementById('b2').value = '';
            document.getElementById('b3').value = '';
            document.getElementById('b4').value = '';
            document.getElementById('resultado').innerHTML = "Ingresa los 4 números para calcular la solución...";
        }
    </script>
</body>
</html>
